{% extends "auth/authbase.html" %}

{% block header %}
    <h1>{% block title %}Login {% endblock %}</h1>
{% endblock %}

{% block form %}
    <img src="{{ url_for('static', filename='logo.png') }}">
<form method="post">
    <label for="username">Username</label> <br>
    <input name="username" placeholder="username" id="username"> <br>
    <label for="password">Password</label> <br>
    <input name="password" placeholder="password" type="password" id="password"> <br>

    <input class="auth-button" type="submit" value="Login">
</form>

{% endblock %}
