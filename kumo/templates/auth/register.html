{% extends "auth/authbase.html" %}

{% block header %}
<h1 xmlns="http://www.w3.org/1999/html">{% block title %}Register{% endblock %}</h1>
{% endblock %}

{% block form %}
<form method="post">
    <label for="username">Username</label> <br>
    <input name="username" placeholder="username" id="username">
    <label for="password">Password</label> <br>
    <input name="password" placeholder="password" type="password" id="password"> <br>

    <input type="submit" value="Register">
    <div class="auth-links-container">
        <a href="" class="auth-link">Forgot your password?</a>
        <a href="{{ url_for('auth.login') }}" class="auth-link align-right">Already have an account?</a>
    </div>
</form>
{% endblock %}
