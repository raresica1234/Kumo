{% extends "base.html" %}

{% block css %}
	<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
	<img src="{{ url_for('static', filename='icons/logo.png') }}" class="auth-logo">
	{% for error in get_flashed_messages() %}
	{% for message in error.split("\n") %}
	<div class="auth-error">{{ message }}</div>
	{% endfor %}
	<br>
	{% endfor %}
	{% block form %}

	{% endblock %}
</div>

{% endblock %}
